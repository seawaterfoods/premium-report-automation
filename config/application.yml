app:
  # 路徑設定
  import-dir: ./import
  output-dir: ./output

  # 年份設定（處理哪一年的資料，留空則自動偵測最新年份）
  process-year: 115

  # 險種欄位控制
  columns:
    # 隱藏的險種代號清單（不列入輸出）
    # 若 9900 在此清單中，明細表不顯示該欄，總表合計也會排除國外分進
    hidden-codes: [9900]

  # 公司排序方式：BY_CODE_ASC | BY_CODE_DESC | BY_NAME
  company-order: BY_CODE_ASC
